<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Redactor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
  <style>
    /* ── Theme variables ── */
    :root {
      --bg:           #1a1a2e;
      --toolbar-bg:   #16213e;
      --border:       #0f3460;
      --btn-bg:       #0f3460;
      --btn-border:   #1a4a7a;
      --btn-hover:    #1a5090;
      --text:         #e0e0e0;
      --text-muted:   #a0a0b0;
      --status-bg:    #12172a;
      --status-text:  #a0b0c0;
      --empty-text:   #6070a0;
      --empty-strong: #a0b0c0;
      --page-shadow:  rgba(0,0,0,0.5);
      --overlay-bg:   rgba(10,15,30,0.7);
    }

    html.light {
      --bg:           #f4f6fb;
      --toolbar-bg:   #ffffff;
      --border:       #dde3f0;
      --btn-bg:       #eaeff8;
      --btn-border:   #c5d0e8;
      --btn-hover:    #d6e0f5;
      --text:         #1a1a2e;
      --text-muted:   #607090;
      --status-bg:    #f0f3fa;
      --status-text:  #506070;
      --empty-text:   #8090b0;
      --empty-strong: #304060;
      --page-shadow:  rgba(0,0,0,0.12);
      --overlay-bg:   rgba(200,210,230,0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.2s, border-color 0.2s;
    }

    #toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
      white-space: nowrap;
      margin-right: 8px;
    }

    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.15s;
      white-space: nowrap;
    }
    .upload-label:hover { background: var(--btn-hover); }
    #file-input { display: none; }

    .divider { width: 1px; height: 28px; background: var(--border); }

    button {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-redact {
      background: #e94560;
      color: #fff;
      font-weight: 600;
    }
    #btn-redact:not(:disabled):hover { background: #c73550; }

    #btn-download {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
    }
    #btn-download:not(:disabled):hover { background: var(--btn-hover); }

    #btn-undo {
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
    }
    #btn-undo:not(:disabled):hover { background: var(--btn-hover); }

    #btn-theme {
      margin-left: auto;
      padding: 6px 10px;
      background: var(--btn-bg);
      color: var(--text);
      border: 1px solid var(--btn-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #btn-theme:hover { background: var(--btn-hover); }

    #page-info { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

    /* Multi-page container */
    #pages-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .page-wrapper {
      position: relative;
      box-shadow: 0 8px 32px var(--page-shadow);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .page-wrapper canvas { display: block; }

    /* Status bar */
    #status-bar {
      padding: 6px 20px;
      font-size: 12px;
      min-height: 28px;
      background: var(--status-bg);
      border-bottom: 1px solid var(--border);
      color: var(--status-text);
      transition: background 0.2s, border-color 0.2s;
    }
    #status-bar.error { color: #e94560; }
    #status-bar.success { color: #4caf87; }
    #status-bar.loading { color: #f0a060; }

    /* ── Viewer ── */
    #viewer-scroll {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    #drop-zone {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 40px;
      border: 2px dashed var(--border);
      border-radius: 12px;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    #empty-state:hover, #empty-state.drag-over {
      border-color: #e94560;
      background: rgba(233, 69, 96, 0.05);
    }
    #empty-state svg { opacity: 0.4; }
    #empty-state p { color: var(--empty-text); font-size: 14px; }
    #empty-state strong { color: var(--empty-strong); }

    /* PDF.js text layer */
    .textLayer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: all;
      overflow: hidden;
    }
    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }
    .textLayer ::selection {
      background: rgba(100, 160, 255, 0.4);
    }

    /* Loading spinner overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #loading-overlay.visible { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <h1>PDF Redactor</h1>

    <label class="upload-label" for="file-input">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Open PDF
    </label>
    <input type="file" id="file-input" accept=".pdf">

    <div class="divider"></div>

    <button id="btn-redact" disabled>Redact Selected</button>
    <button id="btn-undo" disabled>Undo</button>
    <button id="btn-download" disabled>Download</button>

    <button id="btn-theme" title="Toggle light/dark mode"></button>
    <span id="page-info"></span>
  </div>

  <!-- Status bar -->
  <div id="status-bar">Open a PDF to get started.</div>

  <!-- Viewer -->
  <div id="viewer-scroll">
    <div id="drop-zone">

      <!-- Empty / drop state -->
      <div id="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        <strong>Drop a PDF here or click Open PDF</strong>
        <p>Select text on the page, then click <em>Redact Selected</em> to black it out.</p>
      </div>

      <!-- All pages rendered here, one per .page-wrapper div -->
      <div id="pages-container"></div>

    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay"><div class="spinner"></div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
